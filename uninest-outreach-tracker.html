<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UniNest Outreach Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,500&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#1B2A4A;
    --navy-soft:#2E4064;
    --gold:#B08D57;
    --gold-soft:#D9C7A3;
    --cream:#FBF8F2;
    --cream-deep:#F1EBDD;
    --ink:#2B2A28;
    --muted:#8A8578;
    --line:#E6DFCE;
    --good:#5C7A5A;
    --warn:#B08D57;
    --cold:#A9A398;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--cream);
    color:var(--ink);
    font-family:'Quicksand', sans-serif;
    -webkit-tap-highlight-color: transparent;
  }
  .wrap{
    max-width:720px;
    margin:0 auto;
    padding:28px 18px 80px;
  }
  header{
    margin-bottom:22px;
  }
  .eyebrow{
    font-family:'Quicksand', sans-serif;
    font-size:11px;
    letter-spacing:0.22em;
    text-transform:uppercase;
    color:var(--gold);
    font-weight:600;
    margin-bottom:6px;
  }
  h1{
    font-family:'Cormorant Garamond', serif;
    font-weight:600;
    font-size:38px;
    color:var(--navy);
    margin:0 0 4px;
    letter-spacing:0.01em;
  }
  .sub{
    font-size:14px;
    color:var(--muted);
    line-height:1.5;
  }

  /* Nest progress */
  .nest-card{
    background:linear-gradient(160deg, var(--navy) 0%, var(--navy-soft) 100%);
    border-radius:18px;
    padding:20px 22px;
    color:var(--cream);
    margin:22px 0 26px;
    position:relative;
    overflow:hidden;
  }
  .nest-card::after{
    content:"";
    position:absolute;
    right:-40px;
    top:-40px;
    width:140px;
    height:140px;
    background:radial-gradient(circle, rgba(176,141,87,0.35) 0%, rgba(176,141,87,0) 70%);
  }
  .nest-top{
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    margin-bottom:12px;
  }
  .nest-label{
    font-size:11px;
    letter-spacing:0.18em;
    text-transform:uppercase;
    color:var(--gold-soft);
    font-weight:600;
  }
  .nest-count{
    font-family:'Cormorant Garamond', serif;
    font-size:30px;
    font-weight:600;
  }
  .nest-bar-track{
    width:100%;
    height:8px;
    background:rgba(255,255,255,0.14);
    border-radius:6px;
    overflow:hidden;
  }
  .nest-bar-fill{
    height:100%;
    background:linear-gradient(90deg, var(--gold) 0%, var(--gold-soft) 100%);
    border-radius:6px;
    transition:width 0.4s ease;
  }
  .nest-stats{
    display:flex;
    gap:16px;
    margin-top:14px;
    font-size:12px;
    color:var(--gold-soft);
    flex-wrap:wrap;
  }
  .nest-stats span b{
    color:#fff;
    font-weight:700;
  }

  /* Area group */
  .area{
    margin-bottom:26px;
  }
  .area-title{
    font-family:'Cormorant Garamond', serif;
    font-size:20px;
    font-weight:600;
    color:var(--navy);
    display:flex;
    align-items:center;
    gap:8px;
    margin-bottom:10px;
    padding-bottom:6px;
    border-bottom:1px solid var(--line);
  }
  .area-title .tag{
    font-family:'Quicksand', sans-serif;
    font-size:10px;
    background:var(--cream-deep);
    color:var(--muted);
    padding:2px 8px;
    border-radius:20px;
    font-weight:600;
    letter-spacing:0.03em;
  }

  .card{
    background:#fff;
    border:1px solid var(--line);
    border-radius:14px;
    padding:14px 16px;
    margin-bottom:10px;
    transition:box-shadow 0.2s ease, border-color 0.2s ease;
  }
  .card.status-contacted{border-left:4px solid var(--warn);}
  .card.status-responded{border-left:4px solid var(--good);}
  .card.status-onboarded{border-left:4px solid var(--navy);}
  .card.status-not{border-left:4px solid var(--cold);}
  .card.status-nointerest{border-left:4px solid #C0655F; opacity:0.7;}

  .card-top{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:10px;
  }
  .card-name{
    font-weight:700;
    font-size:15px;
    color:var(--ink);
  }
  .card-number{
    font-size:13px;
    color:var(--navy-soft);
    font-weight:600;
    margin-top:2px;
  }
  .card-note-preview{
    font-size:12px;
    color:var(--muted);
    margin-top:4px;
    line-height:1.4;
  }

  .row-actions{
    display:flex;
    gap:8px;
    margin-top:10px;
    flex-wrap:wrap;
    align-items:center;
  }

  select.status-select{
    font-family:'Quicksand', sans-serif;
    font-size:12px;
    font-weight:600;
    padding:6px 10px;
    border-radius:20px;
    border:1px solid var(--line);
    background:var(--cream-deep);
    color:var(--ink);
    appearance:none;
    -webkit-appearance:none;
  }

  a.wa-btn{
    display:inline-flex;
    align-items:center;
    gap:5px;
    font-size:12px;
    font-weight:700;
    color:#fff;
    background:var(--good);
    padding:6px 12px;
    border-radius:20px;
    text-decoration:none;
  }
  a.call-btn{
    display:inline-flex;
    align-items:center;
    gap:5px;
    font-size:12px;
    font-weight:700;
    color:var(--navy);
    background:var(--cream-deep);
    border:1px solid var(--line);
    padding:6px 12px;
    border-radius:20px;
    text-decoration:none;
  }

  textarea.note-input{
    width:100%;
    margin-top:10px;
    font-family:'Quicksand', sans-serif;
    font-size:12.5px;
    padding:8px 10px;
    border-radius:8px;
    border:1px solid var(--line);
    background:var(--cream);
    color:var(--ink);
    resize:vertical;
    min-height:36px;
  }
  textarea.note-input:focus{
    outline:none;
    border-color:var(--gold);
  }

  .add-lead{
    background:#fff;
    border:1.5px dashed var(--gold-soft);
    border-radius:14px;
    padding:14px 16px;
    margin-top:6px;
  }
  .add-lead h3{
    font-family:'Cormorant Garamond', serif;
    font-size:18px;
    color:var(--navy);
    margin:0 0 10px;
    font-weight:600;
  }
  .add-lead input{
    width:100%;
    font-family:'Quicksand', sans-serif;
    font-size:13px;
    padding:9px 11px;
    border-radius:8px;
    border:1px solid var(--line);
    margin-bottom:8px;
    background:var(--cream);
  }
  .add-lead input:focus{
    outline:none;
    border-color:var(--gold);
  }
  .add-btn{
    width:100%;
    font-family:'Quicksand', sans-serif;
    font-weight:700;
    font-size:13px;
    color:#fff;
    background:var(--navy);
    border:none;
    padding:10px;
    border-radius:8px;
    cursor:pointer;
  }
  .add-btn:active{ opacity:0.85; }

  .footer-note{
    text-align:center;
    font-size:11px;
    color:var(--muted);
    margin-top:30px;
    line-height:1.6;
  }

  .loading{
    text-align:center;
    padding:60px 0;
    color:var(--muted);
    font-family:'Cormorant Garamond', serif;
    font-size:18px;
  }
</style>
</head>
<body>
<div class="wrap" id="app">
  <div class="loading">Loading your tracker…</div>
</div>

<script>
const STORAGE_KEY = 'uninest-outreach-leads-v1';

const SEED_LEADS = [
  { id:'l1', area:'Kahawa Wendani', name:'Aquantam Property Realtors', number:'+254 705 061 882', note:'Multiple KWendani bedsitters (KES 6,000–6,500). Multi-area agency.', status:'not' },
  { id:'l2', area:'Kahawa Wendani', name:'Sky Plus Agencies — Wilson Mathu', number:'+254 733 580 152', note:'EARB-registered agency, active bedsitter/1BR listings.', status:'not' },
  { id:'l3', area:'Kahawa Sukari', name:'Aquantam — Larsen\'s Bedsitters', number:'+254 789 796 296', note:'Student-preferred (female tenants), gated community.', status:'not' },
  { id:'l4', area:'Kahawa Sukari', name:'Aquantam main office', number:'0700 224455', note:'General office line, same agency as above.', status:'not' },
  { id:'l5', area:'Roysambu', name:'DAHLIAM Agencies', number:'+254 757 612 420', note:'Roysambu / Zimmerman area agency.', status:'not' },
  { id:'l6', area:'Githurai 45', name:'Listing agent (Emms Suites)', number:'0791 502 313', note:'Bedsitter listing, Githurai 45.', status:'not' },
  { id:'l7', area:'Githurai 45', name:'Independent landlord', number:'0748 465 449', note:'~KES 5,000 unit, Githurai 45.', status:'not' },
  { id:'l8', area:'Juja (JKUAT)', name:'Agent near JKUAT Gate B/C', number:'0706 417 819', note:'Repeated across multiple listings — active multi-unit agent.', status:'not' },
  { id:'l9', area:'Juja (JKUAT)', name:'Pazuri House Agents', number:'0714 003 931', note:'Covers Juja, Ruiru, Toll — multi-area agency.', status:'not' },
  { id:'l10', area:'Ruiru', name:'Mirako Homes', number:'0703 300 333', note:'Covers Ruiru Town, Membley, Kihunguro, Bypass, Kamakis.', status:'not' },
  { id:'l11', area:'Ruiru', name:'Kimbo agent (NIBS College area)', number:'0724 781 657', note:'Multiple bedsitters near NIBS Technical College.', status:'not' },
  { id:'l12', area:'Ruiru', name:'Kimbo/Matangi agent', number:'0715 029 237', note:'Bedsitter listings, Kimbo–Matangi junction.', status:'not' },
];

const STATUS_LABELS = {
  not: 'Not contacted',
  contacted: 'Messaged',
  responded: 'Responded',
  onboarded: 'Onboarded',
  nointerest: 'Not interested'
};

let leads = [];

function waLink(number, name){
  const digits = number.replace(/[^\d+]/g,'').replace(/^0/, '+254');
  const cleanDigits = digits.replace(/\D/g,'');
  const text = encodeURIComponent(`Hi ${name.split(' — ')[0]}, this is Mari from UniNest 👋 We connect university students directly with off-campus housing — free to list, no middleman fees. I'd love to add your available units so students can find you directly. Would you be open to a quick chat?`);
  return `https://wa.me/${cleanDigits}?text=${text}`;
}
function telLink(number){
  return `tel:${number.replace(/\s/g,'')}`;
}

async function loadLeads(){
  try{
    const result = await window.storage.get(STORAGE_KEY, false);
    if(result && result.value){
      leads = JSON.parse(result.value);
    } else {
      leads = SEED_LEADS;
      await saveLeads();
    }
  }catch(e){
    leads = SEED_LEADS;
    try{ await saveLeads(); }catch(e2){}
  }
  render();
}

async function saveLeads(){
  try{
    await window.storage.set(STORAGE_KEY, JSON.stringify(leads), false);
  }catch(e){
    console.error('Save failed', e);
  }
}

function groupByArea(list){
  const groups = {};
  list.forEach(l=>{
    if(!groups[l.area]) groups[l.area] = [];
    groups[l.area].push(l);
  });
  return groups;
}

async function updateStatus(id, status){
  const lead = leads.find(l=>l.id===id);
  if(lead){ lead.status = status; await saveLeads(); render(); }
}

async function updateNote(id, note){
  const lead = leads.find(l=>l.id===id);
  if(lead){ lead.note = note; await saveLeads(); }
}

async function addLead(area, name, number, note){
  if(!area || !name || !number) return;
  const id = 'l' + Date.now();
  leads.push({ id, area, name, number, note: note || '', status:'not' });
  await saveLeads();
  render();
}

function render(){
  const app = document.getElementById('app');
  const total = leads.length;
  const contacted = leads.filter(l=>l.status!=='not').length;
  const responded = leads.filter(l=>l.status==='responded'||l.status==='onboarded').length;
  const onboarded = leads.filter(l=>l.status==='onboarded').length;
  const pct = total ? Math.round((contacted/total)*100) : 0;

  const groups = groupByArea(leads);
  const areaOrder = Object.keys(groups).sort((a,b)=>{
    const order = ['Kahawa Wendani','Kahawa Sukari','Roysambu','Githurai 45','Juja (JKUAT)','Ruiru'];
    const ia = order.indexOf(a), ib = order.indexOf(b);
    if(ia===-1 && ib===-1) return a.localeCompare(b);
    if(ia===-1) return 1;
    if(ib===-1) return -1;
    return ia-ib;
  });

  let html = `
    <header>
      <div class="eyebrow">UniNest · Landlord Outreach</div>
      <h1>Outreach Tracker</h1>
      <div class="sub">Log every call and message as you go — your progress saves automatically on this device.</div>
    </header>

    <div class="nest-card">
      <div class="nest-top">
        <div class="nest-label">Nest Progress</div>
        <div class="nest-count">${contacted}/${total}</div>
      </div>
      <div class="nest-bar-track"><div class="nest-bar-fill" style="width:${pct}%"></div></div>
      <div class="nest-stats">
        <span><b>${contacted}</b>&nbsp;contacted</span>
        <span><b>${responded}</b>&nbsp;responded</span>
        <span><b>${onboarded}</b>&nbsp;onboarded</span>
      </div>
    </div>
  `;

  areaOrder.forEach(area=>{
    html += `<div class="area"><div class="area-title">${area} <span class="tag">${groups[area].length}</span></div>`;
    groups[area].forEach(lead=>{
      html += `
        <div class="card status-${lead.status}">
          <div class="card-top">
            <div>
              <div class="card-name">${lead.name}</div>
              <div class="card-number">${lead.number}</div>
            </div>
          </div>
          <div class="row-actions">
            <select class="status-select" onchange="updateStatus('${lead.id}', this.value)">
              ${Object.entries(STATUS_LABELS).map(([val,label])=>
                `<option value="${val}" ${lead.status===val?'selected':''}>${label}</option>`
              ).join('')}
            </select>
            <a class="wa-btn" href="${waLink(lead.number, lead.name)}" target="_blank" rel="noopener">WhatsApp</a>
            <a class="call-btn" href="${telLink(lead.number)}">Call</a>
          </div>
          <textarea class="note-input" placeholder="Notes…" onblur="updateNote('${lead.id}', this.value)">${lead.note||''}</textarea>
        </div>
      `;
    });
    html += `</div>`;
  });

  html += `
    <div class="add-lead">
      <h3>Add a new lead</h3>
      <input id="new-area" placeholder="Area (e.g. Kahawa Wendani)" />
      <input id="new-name" placeholder="Name / agency" />
      <input id="new-number" placeholder="Phone number" />
      <input id="new-note" placeholder="Notes (optional)" />
      <button class="add-btn" onclick="handleAdd()">Add lead</button>
    </div>

    <div class="footer-note">UniNest Outreach Tracker · data stored privately on this device</div>
  `;

  app.innerHTML = html;
}

async function handleAdd(){
  const area = document.getElementById('new-area').value.trim();
  const name = document.getElementById('new-name').value.trim();
  const number = document.getElementById('new-number').value.trim();
  const note = document.getElementById('new-note').value.trim();
  if(!area || !name || !number){
    alert('Please fill in area, name, and number.');
    return;
  }
  await addLead(area, name, number, note);
}

window.updateStatus = updateStatus;
window.updateNote = updateNote;
window.handleAdd = handleAdd;

loadLeads();
</script>
</body>
</html>
